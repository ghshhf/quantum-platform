# =====================================================================
# MonkeyCode 本地局域网部署专用 docker-compose 配置
# ---------------------------------------------------------------------
# 目标：在单台主机上快速拉起一套轻量 MonkeyCode，局域网内其他设备可通过
# 固定 IP 10.10.50.0/24 访问。相比完整版（clickhouse / rustfs / ingress /
# taskflow / preview），本文件只保留核心 4 个服务 + 可选 Ollama 本地推理。
# ---------------------------------------------------------------------
# 启动：
#   docker compose -f docker-compose.local.yml --env-file .env.local up -d
# 查看日志：
#   docker compose -f docker-compose.local.yml logs -f backend
# 停止：
#   docker compose -f docker-compose.local.yml down
# =====================================================================

name: monkeycode-local

services:
  # -------------------------------------------------------------------
  # db: PostgreSQL 主数据库，存储用户/项目/任务等核心业务数据。
  # 固定 IP: 10.10.50.11
  # -------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: monkeycode-local-db
    restart: always
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monkeycode}
      POSTGRES_USER: ${POSTGRES_USER:-monkeycode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${INSTALL_DIR}/data/postgres:/var/lib/postgresql/data
    networks:
      monkeycode-local:
        ipv4_address: 10.10.50.11
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------
  # redis: 缓存 & 轻量队列，backend 会订阅任务状态。
  # 固定 IP: 10.10.50.12
  # -------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: monkeycode-local-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - ${INSTALL_DIR}/data/redis:/data
    networks:
      monkeycode-local:
        ipv4_address: 10.10.50.12
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # -------------------------------------------------------------------
  # ollama: 可选本地推理引擎。挂载 ~/.ollama 到宿主机目录以便复用模型。
  # 固定 IP: 10.10.50.13，宿主机暴露 11434 端口便于桌面工具直连。
  # 若不启用可在 up 时显式指定服务列表：
  #   docker compose -f docker-compose.local.yml up -d db redis backend frontend
  # -------------------------------------------------------------------
  ollama:
    image: ollama/ollama
    container_name: monkeycode-local-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${INSTALL_DIR}/data/ollama:/root/.ollama
    networks:
      monkeycode-local:
        ipv4_address: 10.10.50.13
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # -------------------------------------------------------------------
  # backend: MonkeyCode Go 后端 API 服务。
  # 容器内监听 :8888；前端通过内部网络调用，宿主机不必暴露。
  # 固定 IP: 10.10.50.20
  # -------------------------------------------------------------------
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/ghshhf/monkeycode/backend:latest}
    container_name: monkeycode-local-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ----- 核心配置（MCAI_ 前缀自动注入 viper config）-----
      MCAI_LOGGER_LEVEL: info
      MCAI_SERVER_BASE_URL: http://${LOCAL_IP:-127.0.0.1}:8080
      MCAI_HOST_INSTALLER_MODE: offline
      MCAI_TASK_CREATE_REQ_TTL_SECONDS: 3600

      # 数据库（postgres:// 由固定 IP 拼接）
      MCAI_DATABASE_MASTER: postgres://${POSTGRES_USER:-monkeycode}:${POSTGRES_PASSWORD}@10.10.50.11:5432/${POSTGRES_DB:-monkeycode}?sslmode=disable&timezone=Asia/Shanghai

      # Redis
      MCAI_REDIS_HOST: 10.10.50.12
      MCAI_REDIS_PASS: ${REDIS_PASSWORD}
      MCAI_REDIS_PORT: 6379
      MCAI_REDIS_DB: 0

      # ClickHouse 禁用（轻量部署用本地日志 / sqlite 即可）
      MCAI_CLICKHOUSE_INIT_ENABLED: false
      MCAI_CLICKHOUSE_ADDR: ""

      # 初始团队账号（从 .env.local 读取，首次启动时自动创建）
      MCAI_INIT_TEAM_EMAIL: ${MCAI_INIT_TEAM_EMAIL:-admin@example.com}
      MCAI_INIT_TEAM_NAME: ${MCAI_INIT_TEAM_NAME:-Local Team}
      MCAI_INIT_TEAM_PASSWORD: ${MCAI_INIT_TEAM_PASSWORD:-admin123}

      # 对象存储禁用：改为本地文件系统（/app/static/uploads）
      MCAI_OBJECT_STORAGE_ENABLED: false
      MCAI_STATIC_FILES_ENABLED: true
      MCAI_STATIC_FILES_DIR: /app/static
      MCAI_STATIC_FILES_ROUTE_PREFIX: /static

      # TaskFlow / LLM Proxy 不启用（backend 单进程模式）
      MCAI_TASKFLOW_GRPC_URL: ""
      MCAI_TASK_LLM_PROXY_ENABLED: false

      # ----- 本地 Ollama 配置（可选）-----
      # 在 Web UI 的 "设置 - 模型" 中也可以配置；这里给出一组默认值。
      MCAI_LLM_BASE_URL: http://10.10.50.13:11434/v1
      MCAI_LLM_API_KEY: "ollama"
      MCAI_LLM_MODEL: ${MCAI_LLM_MODEL:-qwen2.5:7b}
      MCAI_LLM_INTERFACE_TYPE: openai_chat

      TZ: Asia/Shanghai
    volumes:
      - ${INSTALL_DIR}/data/uploads:/app/static/uploads
      - ${INSTALL_DIR}/static:/app/static
    networks:
      monkeycode-local:
        ipv4_address: 10.10.50.20
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------
  # frontend: MonkeyCode Web 前端（Nginx / 静态产物），对外暴露 8080。
  # 前端容器内部会把 /api 请求反代到 backend 的 8888。
  # 固定 IP: 10.10.50.21，宿主机端口 8080。
  # -------------------------------------------------------------------
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/ghshhf/monkeycode/frontend:latest}
    container_name: monkeycode-local-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      BACKEND_API_BASE: http://10.10.50.20:8888
      TZ: Asia/Shanghai
    networks:
      monkeycode-local:
        ipv4_address: 10.10.50.21

networks:
  monkeycode-local:
    name: monkeycode-local
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.10.50.0/24
          gateway: 10.10.50.1

# ---------------------------------------------------------------------
# 启动命令提示（复制到终端执行即可）：
#   cd /workspace/MonkeyCode/backend
#   docker compose -f docker-compose.local.yml --env-file .env.local up -d
# ---------------------------------------------------------------------
