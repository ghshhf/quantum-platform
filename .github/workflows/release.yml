# ─── Release CI ──────────────────────────────────────────────────────────────
# git tag 触发 → 编译多平台二进制 → GitHub Release → Docker 镜像推送
#
# 触发方式:
#   git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*"   # v0.1.0, v1.2.3, v2026.01.01 等

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test -race -count=1 -timeout=120s ./...

      - name: Build binaries (linux/amd64, linux/arm64)
        working-directory: backend
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/quantum-server-linux-amd64 ./cmd/server
          GOOS=linux GOARCH=arm64 go build -o dist/quantum-server-linux-arm64 ./cmd/server
          GOOS=darwin GOARCH=amd64 go build -o dist/quantum-server-darwin-amd64 ./cmd/server
          GOOS=darwin GOARCH=arm64 go build -o dist/quantum-server-darwin-arm64 ./cmd/server
          GOOS=windows GOARCH=amd64 go build -o dist/quantum-server-windows-amd64.exe ./cmd/server

      - name: Generate checksums
        working-directory: backend/dist
        run: sha256sum * > checksums.txt

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "quantum-platform ${{ github.ref_name }}"
          body: |
            ## 量子平台 ${{ github.ref_name }}

            请参见 [CHANGES.md](CHANGES.md) 了解完整变更日志。

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Linux amd64 | `quantum-server-linux-amd64` |
            | Linux arm64 | `quantum-server-linux-arm64` |
            | macOS amd64 (Intel) | `quantum-server-darwin-amd64` |
            | macOS arm64 (Apple Silicon) | `quantum-server-darwin-arm64` |
            | Windows amd64 | `quantum-server-windows-amd64.exe` |
          files: |
            backend/dist/*
          draft: false
          prerelease: false

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/build/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/backend:latest
          build-args: |
            REPO_COMMIT=${{ github.sha }}
